<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SmartHost AI</title>
  <style>
    body {
      font-family: Arial;
      width: 300px;
      padding: 15px;
      background: #111;
      color: white;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #result {
      margin-top: 10px;
      padding: 8px;
      background: #1a1a1a;
      border-radius: 6px;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h3>SmartHost AI</h3>

  <textarea id="message" placeholder="Paste guest message..."></textarea>

  <button id="generate">Generate Reply</button>

  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
